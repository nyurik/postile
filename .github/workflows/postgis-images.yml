name: PostGIS Images

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: postgis-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch'
      || (
        github.event.workflow_run.conclusion == 'success'
        && (
          (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
          || github.event.workflow_run.event == 'release'
        )
      )
    name: ${{ matrix.postgis_tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - postgis_tag: 14-3.5
            pg: 14
          - postgis_tag: 15-3.5
            pg: 15
          - postgis_tag: 16-3.5
            pg: 16
          - postgis_tag: 17-3.5
            pg: 17
          - postgis_tag: 18-3.6
            pg: 18
    steps:
      - uses: actions/checkout@v7

      - uses: taiki-e/install-action@v2
        with: { tool: just }

      - name: Read crate versions
        id: versions
        run: |
          echo "postile=$(just get-crate-field version)" >> "$GITHUB_OUTPUT"

      - if: github.event_name == 'workflow_run'
        name: Download package artifact from CI
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          gh run download "$RUN_ID" \
            --name "package-linux-x86_64-pg${{ matrix.pg }}" \
            --dir target/release

      - if: github.event_name == 'workflow_dispatch'
        name: Build package artifact for manual run
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev pkg-config \
            postgresql-${{ matrix.pg }} postgresql-server-dev-${{ matrix.pg }}
          pg_config_path="/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"
          sudo chmod a+rwx "$("${pg_config_path}" --pkglibdir)" "$("${pg_config_path}" --sharedir)/extension"
          just init-pg pg${{ matrix.pg }} "$pg_config_path"
          just package pg${{ matrix.pg }}

      - name: Verify package artifact exists
        run: test -f "target/release/postile-pg${{ matrix.pg }}.tar.gz"

      - name: Resolve image tag
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/postgis-postile"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image}:${{ matrix.postgis_tag }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/postgis/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.image.outputs.tag }}
          build-args: |
            BASE_IMAGE=postgis/postgis:${{ matrix.postgis_tag }}
            PG_MAJOR=${{ matrix.pg }}
            POSTILE_VERSION=${{ steps.versions.outputs.postile }}
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.versions.outputs.postile }}
            org.opencontainers.image.base.name=postgis/postgis:${{ matrix.postgis_tag }}
          cache-from: type=gha,scope=postgis-${{ matrix.postgis_tag }}
          cache-to: type=gha,mode=max,scope=postgis-${{ matrix.postgis_tag }}

      - name: Smoke test image
        run: bash docker/postgis/smoke-test.sh "${{ steps.image.outputs.tag }}"

      - name: Push image
        run: docker push "${{ steps.image.outputs.tag }}"
