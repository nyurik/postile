name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.target.name }} pg${{ matrix.pg }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        pg: [13, 14, 15, 16, 17, 18]
        target:
          - name: aarch64-apple-darwin
            os: macOS-14
          - name: x86_64-apple-darwin
            os: macOS-13
          - name: x86_64-pc-windows-msvc
            os: windows-latest
          - name: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target.name }}-pg${{ matrix.pg }}
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-binstall
      # Linux build deps
      - if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config
          version: 1.0
      # macOS build deps
      - if: runner.os == 'macOS'
        run: |
          brew install icu4c pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix icu4c)/lib/pkgconfig" >> "$GITHUB_ENV"
      # Lint (once, on the primary matrix entry)
      - if: matrix.target.os == 'ubuntu-latest' && matrix.pg == 13
        name: Lint
        run: just env-info test-fmt clippy check
      # Test
      - run: just test-pg pg${{ matrix.pg }}
      # Coverage (once, on the primary matrix entry)
      - if: matrix.target.os == 'ubuntu-latest' && matrix.pg == 13
        uses: taiki-e/install-action@v2
        with: { tool: cargo-llvm-cov }
      - if: matrix.target.os == 'ubuntu-latest' && matrix.pg == 13
        name: Coverage
        run: just ci-coverage
      - if: matrix.target.os == 'ubuntu-latest' && matrix.pg == 13
        name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/llvm-cov/codecov.info
      - if: matrix.target.os == 'ubuntu-latest' && matrix.pg == 13
        run: just assert-git-is-clean
      # Package (Linux + main branch only)
      - if: runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: just package pg${{ matrix.pg }}
      - if: runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: postile-pg${{ matrix.pg }}
          path: target/release/postile-pg${{ matrix.pg }}.tar.gz

  # This job checks if any of the previous jobs failed or were canceled.
  # This approach also allows some jobs to be skipped if they are not needed.
  ci-passed:
    needs: [ test ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Result of the needed steps
        run: echo "${{ toJSON(needs) }}"
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

  # Release unpublished packages or create a PR with changes
  release-plz:
    needs: [ ci-passed ]
    if: |
      always()
      && needs.ci-passed.result == 'success'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && github.repository_owner == 'nyurik'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0, persist-credentials: false }
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io if crate's version is newer
        uses: release-plz/action@v0.5
        id: release
        with: { command: release }
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - if: ${{ steps.release.outputs.releases_created == 'false' }}
        name: If version is the same, create a PR proposing new version and changelog for the next release
        uses: release-plz/action@v0.5
        with: { command: release-pr }
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Extract release tag
        id: get-tag
        if: steps.release.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release.outputs.releases }}
        run: echo "tag=$(echo "$RELEASES" | jq -r '.[0].tag')" >> "$GITHUB_OUTPUT"
      - if: steps.release.outputs.releases_created == 'false'
        name: Create/update a PR proposing new version and changelog
        uses: release-plz/action@v0.5
        with: { command: release-pr }
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - if: steps.release.outputs.releases_created == 'false'
        uses: actions/download-artifact@v4
        with: { pattern: postile-pg*, merge-multiple: true }
      - if: steps.release.outputs.releases_created == 'false'
        name: Upload packages to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-plz.outputs.tag }}
        run: gh release upload "$TAG" *.tar.gz --repo "$GITHUB_REPOSITORY"
