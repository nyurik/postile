name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: Run the full OS/PostgreSQL matrix
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: ${{ matrix.target.name }} pg${{ matrix.pg }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        pg: ${{ fromJSON((github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.full_matrix)) && '[18]' || '[13,14,15,16,17,18]') }}
        target:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: linux-aarch64
            os: ubuntu-24.04-arm
          - name: macos-aarch64
            os: macos-latest
          - name: macos-x86_64
            os: macos-15-intel
          - name: windows-x86_64
            os: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with: { tool: 'just,cargo-binstall' }
      - name: Set workflow variables
        id: variables
        run: |
          pgrx_version="$(just get-pgrx-version)"
          postile_version="$(just get-crate-field version)"
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/postgis-postile"
          postgis_tag=""
          publish_image=false

          case "${{ matrix.pg }}" in
            14) postgis_tag="14-3.5" ;;
            15) postgis_tag="15-3.5" ;;
            16) postgis_tag="16-3.5" ;;
            17) postgis_tag="17-3.5" ;;
            18) postgis_tag="18-3.6" ;;
          esac

          if [[ "${{ github.event_name }}" != 'pull_request' && "${{ matrix.target.name }}" == 'linux-x86_64' && -n "$postgis_tag" ]]; then
            publish_image=true
          fi

          echo "pgrx_version=${pgrx_version}" >> "$GITHUB_OUTPUT"
          echo "postile_version=${postile_version}" >> "$GITHUB_OUTPUT"
          echo "pg_feature=pg${{ matrix.pg }}" >> "$GITHUB_OUTPUT"
          echo "cache_key=${{ matrix.target.name }}-pg${{ matrix.pg }}-${pgrx_version}" >> "$GITHUB_OUTPUT"
          echo "run_ci_extras=${{ matrix.target.name == 'linux-x86_64' && matrix.pg == 18 }}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image}:${postgis_tag}" >> "$GITHUB_OUTPUT"
          echo "postgis_tag=${postgis_tag}" >> "$GITHUB_OUTPUT"
          echo "publish_image=${publish_image}" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.variables.outputs.cache_key }}
          cache-on-failure: true
          cache-bin: false
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-pgrx@${{ steps.variables.outputs.pgrx_version }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.pgrx/config.toml
            ~/.pgrx/${{ matrix.pg }}.*
          key: pgrx-${{ steps.variables.outputs.cache_key }}-${{ hashFiles('Cargo.toml') }}
          restore-keys: pgrx-${{ steps.variables.outputs.cache_key }}-
      - if: runner.os == 'Linux'
        name: Configure PGDG apt repository
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
      - if: runner.os == 'Linux'
        name: Install PostgreSQL and build dependencies (Linux)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            build-essential clang libclang-dev libreadline-dev zlib1g-dev flex bison
            libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config
            postgresql-${{ matrix.pg }} postgresql-server-dev-${{ matrix.pg }}
          version: ${{ steps.variables.outputs.cache_key }}-v1
          execute_install_scripts: true
      - if: runner.os == 'Linux'
        name: Set Linux pg_config path
        run: |
          pg_config_path="/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"
          echo "PG_CONFIG_PATH=${pg_config_path}" >> "$GITHUB_ENV"
          sudo chmod a+rwx "$("${pg_config_path}" --pkglibdir)" "$("${pg_config_path}" --sharedir)/extension"
      - if: runner.os == 'macOS'
        name: Install PostgreSQL and build dependencies (macOS)
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install icu4c pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix icu4c)/lib/pkgconfig" >> "$GITHUB_ENV"
          if HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install postgresql@${{ matrix.pg }}; then
            echo "$(brew --prefix postgresql@${{ matrix.pg }})/bin" >> "$GITHUB_PATH"
            echo "PG_CONFIG_PATH=$(brew --prefix postgresql@${{ matrix.pg }})/bin/pg_config" >> "$GITHUB_ENV"
          else
            echo "Homebrew postgresql@${{ matrix.pg }} is unavailable; pgrx will download PostgreSQL."
            echo "PG_CONFIG_PATH=" >> "$GITHUB_ENV"
          fi
      - if: runner.os == 'Windows'
        name: Select pgrx-managed PostgreSQL (Windows)
        run: echo "PG_CONFIG_PATH=" >> "$GITHUB_ENV"
      - run: rm -rf "$HOME/.pgrx/data-${{ matrix.pg }}"
      - run: just init-pg ${{ steps.variables.outputs.pg_feature }} "$PG_CONFIG_PATH"
      - if: steps.variables.outputs.run_ci_extras == 'true'
        run: just ci-lint ${{ steps.variables.outputs.pg_feature }}
      - run: just test ${{ steps.variables.outputs.pg_feature }}
      - if: steps.variables.outputs.run_ci_extras == 'true'
        uses: taiki-e/install-action@v2
        with: { tool: cargo-llvm-cov }
      - if: steps.variables.outputs.run_ci_extras == 'true'
        run: just ci-coverage ${{ steps.variables.outputs.pg_feature }}
      - if: steps.variables.outputs.run_ci_extras == 'true'
        name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
      - if: steps.variables.outputs.run_ci_extras == 'true'
        run: just assert-git-is-clean
      - if: steps.variables.outputs.publish_image == 'true'
        name: Build extension archive for image
        run: just package ${{ steps.variables.outputs.pg_feature }}
      - if: steps.variables.outputs.publish_image == 'true'
        uses: docker/setup-buildx-action@v4
      - if: steps.variables.outputs.publish_image == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.variables.outputs.publish_image == 'true'
        name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/postgis/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.variables.outputs.image_tag }}
          build-args: |
            BASE_IMAGE=postgis/postgis:${{ steps.variables.outputs.postgis_tag }}
            PG_MAJOR=${{ matrix.pg }}
            POSTILE_VERSION=${{ steps.variables.outputs.postile_version }}
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.variables.outputs.postile_version }}
            org.opencontainers.image.base.name=postgis/postgis:${{ steps.variables.outputs.postgis_tag }}
          cache-from: type=gha,scope=postgis-${{ steps.variables.outputs.postgis_tag }}
          cache-to: type=gha,mode=max,scope=postgis-${{ steps.variables.outputs.postgis_tag }}

      - if: steps.variables.outputs.publish_image == 'true'
        run: bash docker/postgis/smoke-test.sh "${{ steps.variables.outputs.image_tag }}"
      - if: steps.variables.outputs.publish_image == 'true'
        run: docker push "${{ steps.variables.outputs.image_tag }}"

  # This job checks if any of the previous jobs failed or were canceled.
  # This approach also allows some jobs to be skipped if they are not needed.
  ci-passed:
    needs: [ test ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Result of the needed steps
        run: echo "${{ toJSON(needs) }}"
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
